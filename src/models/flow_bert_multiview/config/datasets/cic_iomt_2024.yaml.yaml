name: CIC-IoMT-2024

flow_data_path: "/home/disk_10T/tyj_data/processed_data/CIC-IoMT-2024-session-srcIP_srcPort_dstIP_dstPort_proto/all_embedded_flow.csv"
session_split_path: "/home/disk_10T/tyj_data/processed_data/CIC-IoMT-2024-session-srcIP_srcPort_dstIP_dstPort_proto/all_split_session.csv"
downsample_benign_only: false  # 是否仅对 benign 类别进行下采样，保持攻击样本的完整性

# DNS：53端口和dns服务的流量也被过滤掉，因为 DNS 已经通过域名反查特征被充分利用
# 而且这个数据并不做 DNS 流量分类任务，比如检测 DNS 隧道等。
# NTP: 属于基础时间同步服务，行为模式固定、周期性强，与攻击流量区分度低。非研究重点协议，且在图中易形成高频噪声节点。
# DHCP：67/68，广播型、一次性、无行为区分度
# ARP	二层地址解析，和攻击语义无关
# mDNS / LLMNR	本地名称解析，流量碎片化
# NBNS	Windows 广播噪声
exclude_ports: [53, 67, 68, 123]
exclude_services: ["dns", "dhcp", "ntp", "arp", "mdns", "llmnr", "nbns"]

# 对于CIC-IoMT-2024数据集，类别分布如下：
# ```
# label
# malicious_MQTT-DDoS-Connect_Flood           2730710
# malicious_TCP_IP-DDoS-TCP                   2322590
# malicious_TCP_IP-DoS-TCP                     656960
# malicious_Recon-Port_Scan                    211788
# malicious_TCP_IP-DDoS-UDP                    165723
# malicious_MQTT-DoS-Connect_Flood             145529
# malicious_TCP_IP-DoS-UDP                      58170
# malicious_MQTT-DDoS-Publish_Flood             51075
# malicious_Recon-OS_Scan                       30974
# benign_active                                 25010
# benign_idle                                   14585
# benign_unknown                                14125
# malicious_Recon-VulScan                        4265
# malicious_TCP_IP-DDoS-ICMP                     1812
# malicious_ARP_Spoofing                         1359
# malicious_TCP_IP-DoS-ICMP                      1138
# benign_interaction_Ecobee_Camera                824
# malicious_MQTT-Malformed_Data                   789
# benign_power                                    389
# malicious_MQTT-DoS-Publish_Flood                383
# benign_interaction_Owltron_Camera               354
# benign_interaction_M1T_Camera                   165
# benign_interaction_Singcall                      72
# malicious_Recon-Ping_Sweep                       44
# benign_interaction_Multifunctional_Pager         33
# benign_interaction_Blink_Camera                  32
# benign_interaction_SenseU                         5
# ```

# 明确声明：加载数据的时候，过滤这些类别的流量
# 前面三个攻击类别的样本太少，影响训练效果，直接排除掉
# 后面两个攻击类别的样本太多，带来极端的样本不平衡
# 如果benign占比极端到1%，那么用is_malicious任务训练的时候，会出现梯度里面大量的Nan。
excluded_classes:
  - malicious_Recon-Ping_Sweep
  - malicious_MQTT-DoS-Publish_Flood
  - malicious_MQTT-Malformed_Data
  - malicious_MQTT-DDoS-Connect_Flood
  - malicious_TCP_IP-DDoS-TCP
  - malicious_TCP_IP-DoS-TCP
  - malicious_Recon-Port_Scan
  - malicious_ARP_Spoofing

# 合并某些类别以缓解类别不平衡问题
merged_classes:
  benign:
    - benign_active
    - benign_idle
    - benign_unknown
    - benign_power
    - benign_interaction_Ecobee_Camera
    - benign_interaction_Owltron_Camera
    - benign_interaction_M1T_Camera
    - benign_interaction_Singcall
    - benign_interaction_Multifunctional_Pager
    - benign_interaction_Blink_Camera
    - benign_interaction_SenseU

labels:
  is_malicious:
    type: binary
    classes: [benign, malicious]

  attack_family:
    type: multiclass
    classes:
      - DoS
      - DDoS
      - Recon
      # - ARP_Spoofing  # excluded_classes
      # - Malformed_Data # excluded_classes

  attack_type:
    type: multiclass
    classes:
      # - malicious_MQTT-DDoS-Connect_Flood # excluded_classes
      - malicious_MQTT-DDoS-Publish_Flood

      # - malicious_TCP_IP-DDoS-TCP # excluded_classes
      - malicious_TCP_IP-DDoS-UDP
      - malicious_TCP_IP-DDoS-ICMP
      # - malicious_TCP_IP-DoS-TCP # excluded_classes
      - malicious_TCP_IP-DoS-UDP
      - malicious_TCP_IP-DoS-ICMP

      - malicious_MQTT-DoS-Connect_Flood
      # - malicious_MQTT-DoS-Publish_Flood # excluded_classes
      # - malicious_Recon-Port_Scan # excluded_classes
      - malicious_Recon-OS_Scan
      - malicious_Recon-VulScan
      # - malicious_ARP_Spoofing # excluded_classes
      # - malicious_Malformed_Data # excluded_classes

    parent: attack_family
    parent_mapping:
      # malicious_MQTT-DDoS-Connect_Flood: DDoS # excluded_classes
      malicious_MQTT-DDoS-Publish_Flood: DDoS
      # malicious_TCP_IP-DDoS-TCP: DDoS # excluded_classes
      malicious_TCP_IP-DDoS-UDP: DDoS
      malicious_TCP_IP-DDoS-ICMP: DDoS

      # malicious_TCP_IP-DoS-TCP: DoS # excluded_classes
      malicious_TCP_IP-DoS-UDP: DoS
      malicious_TCP_IP-DoS-ICMP: DoS
      malicious_MQTT-DoS-Connect_Flood: DoS
      # malicious_MQTT-DoS-Publish_Flood: DoS # excluded_classes

      # malicious_Recon-Port_Scan: Recon  # excluded_classes
      malicious_Recon-OS_Scan: Recon
      malicious_Recon-VulScan: Recon
      # malicious_Recon-Ping_Sweep: Recon # excluded_classes

      # malicious_ARP_Spoofing: ARP_Spoofing  # excluded_classes
      # malicious_MQTT-Malformed_Data: Malformed_Data # excluded_classes


tasks:
  # ===============================
  # ⭐ 主指标
  # ===============================
  primary: is_malicious

  outputs:
    # ===============================
    # 1️⃣ is_malicious（二分类，主任务）
    # ===============================
    is_malicious:
      weight: 1.0   # 主任务权重配置
      type: binary
      loss: bce     # 仅供提醒，使用 Binary Cross-Entropy（默认设置），适用于二分类 / OVR 多标签任务

      # CIC-IoMT-2024数据集类别不均衡，需加权
      # is_malicious 的统计基于 excluded_classes 过滤后的数据
      # Benign    = 55,594
      # Malicious = 459,686
      # Benign / Malicious ≈ 0.12

      class_weights: [1.0, 0.12]   # [benign, malicious]

      classifier:
        hidden_dims: [256, 128]
        dropout: 0.1
        activation: gelu

    # =====================================
    # 2️⃣ attack_family（OVR，多类别语义）
    # =====================================
    attack_family:
      enabled: true
      weight: 0.5                 # ⭐ 不与 is_malicious 抢主导
      type: multiclass   # 仅供提醒，攻击家族的多分类
      strategy: ovr   # One-vs-Rest，多分类通过多个二分类（每个 attack_family 一个 BCE），适合类别不平衡场景
      loss: bce   # 仅供提醒，使用 Binary Cross-Entropy（默认设置），适用于二分类 / OVR 多标签任务

      # 注意：attack_family 的 loss 仅在 malicious 样本上计算，
      # 且基于 excluded_classes 过滤后的剩余恶意样本统计。
      #
      # Remaining malicious flows = 460,045

      # [neg, pos]，其中 pos_weight = rest/pos = (N_malicious - N_pos) / N_pos
      class_weights:
        # DoS 频次 = 204,837
        # DoS Rest = 460,045 - 204,837 = 255,208
        # rest/pos = 255,208 / 204,837 ≈ 1.25
        DoS:          [1.0, 1.25]

        # DDoS 频次 = 218,610
        # DDoS Rest = 460,045 - 218,610 = 241,435
        # rest/pos = 241,435 / 218,610 ≈ 1.10
        DDoS:         [1.0, 1.10]

        # Recon 频次 = 35,239
        # Recon Rest = 460,045 - 35,239 = 424,806
        # rest/pos = 424,806 / 35,239 ≈ 12.06
        Recon:        [1.0, 12.06]

        # ARP_Spoofing 频次 = 1,359
        # ARP_Spoofing Rest = 460,045 - 1,359 = 458,686
        # rest/pos = 458,686 / 1,359 ≈ 337.5
        # ARP_Spoofing: [1.0, 337.5]

        # Malformed_Data = 0   （当前训练集中不存在，处于# excluded_classes）
        # Malformed_Data: [1.0, 20.0]  # excluded_classes

      classifier:
        hidden_dims: [256]
        dropout: 0.1
        activation: gelu

    # ==================================================
    # 3️⃣ attack_type（Softmax，多类别语义）
    # ==================================================
    attack_type:
      enabled: true
      weight: 0.5
      type: multiclass
      strategy: softmax
      loss:
        name: focal             # ce | focal
        gamma: 2.0              # focal 参数
        use_class_weight: true  # 是否叠加 class weight

      # attack_type 中参与训练的恶意样本总数 = 460,045
      # 权重基于剩余 attack_type 类别的相对频次（sqrt 缩放），
      # 并与 focal loss (gamma=2.0) 叠加使用，避免极端小类梯度主导。

      class_weights:
        # malicious_MQTT-DDoS-Connect_Flood:  1.00  # 2,730,710 : 6,383,309
        # malicious_TCP_IP-DDoS-TCP:          1.04  # 2,322,590 : 6,383,309
        # malicious_TCP_IP-DoS-TCP:           1.43  #   656,960 : 6,383,309
        # malicious_Recon-Port_Scan:          1.90  #   211,788 : 6,383,309
        # DDoS
        malicious_TCP_IP-DDoS-UDP:          1.00  # 165,723 : 460,045
        malicious_TCP_IP-DDoS-ICMP:         9.57  #   1,812 : 460,045
        malicious_MQTT-DDoS-Publish_Flood:  1.80  #  51,075 : 460,045

        # DoS
        malicious_MQTT-DoS-Connect_Flood:   1.07  # 145,529 : 460,045
        malicious_TCP_IP-DoS-UDP:           1.69  #  58,170 : 460,045
        malicious_TCP_IP-DoS-ICMP:          12.08 #   1,138 : 460,045

        # Recon
        malicious_Recon-OS_Scan:            2.31  #  30,974 : 460,045
        malicious_Recon-VulScan:            6.23  #   4,265 : 460,045

        # ARP
        # malicious_ARP_Spoofing:             11.04 #   1,359 : 460,045

      classifier:
        hidden_dims: [256]
        dropout: 0.1
        activation: gelu